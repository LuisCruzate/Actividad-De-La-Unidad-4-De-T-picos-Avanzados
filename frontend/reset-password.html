<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restablecer Contraseña</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-wrapper">
    <header class="header">
      <div class="header-content">
        <h1>🔒 Restablecer Contraseña</h1>
        <a href="index.html" class="btn-header">← Iniciar Sesión</a>
      </div>
    </header>

    <main class="main-content">
      <div class="content-wrapper">
        <div class="container">
          <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2>Ingresa tu nueva contraseña</h2>
            <form id="resetForm">
              <input type="hidden" id="resetToken" />
              <div class="form-group">
                <label>Nueva contraseña</label>
                <input id="nuevaPass" type="password" placeholder="Nueva contraseña segura" required />
              </div>
              <div class="form-group">
                <label>Confirmar nueva contraseña</label>
                <input id="confirmPass" type="password" placeholder="Repite la nueva contraseña" required />
              </div>
              <div id="msg"></div>
              <button type="submit" class="btn btn-primary">Restablecer</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('resetToken').value = urlParams.get('resetToken') || '';
    if (!document.getElementById('resetToken').value) {
      document.querySelector('.card').innerHTML = '<p>Error: Token inválido.</p>';
    }
    // TODO: POST /api/users/reset-password con token + pass
  </script>
</body>
</html>
